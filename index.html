<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-logo">
      <span class="logo-icon">⚡</span>
      <h1>TaskFlow</h1>
      <p>Управляй задачами. Прокачивай себя.</p>
    </div>

    <div class="auth-tabs">
      <button type="button" class="tab-btn active" id="loginTab">Войти</button>
      <button type="button" class="tab-btn" id="registerTab">Регистрация</button>
    </div>

    <form id="authForm">
      <div class="form-group" id="nameGroup" style="display:none">
        <label>Имя пользователя</label>
        <input type="text" id="username" placeholder="Твой никнейм" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="example@mail.com" required />
      </div>

      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="password" placeholder="Минимум 6 символов" required />
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">Войти</button>
      <p class="auth-error" id="authError"></p>
    </form>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
